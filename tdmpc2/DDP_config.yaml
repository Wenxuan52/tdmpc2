defaults:
  - config

# Offline training DDP parameters
use_ddp: true
distributed_backend: nccl
distributed_init_method: env://
distributed_timeout_sec: 1800
device: null
local_rank: 0
global_rank: 0
world_size: 1
master_addr: '127.0.0.1'
master_port: 29500

# Set true for TD-MPC2 because update uses multiple method-dispatched forwards
# where not all parameters participate in every call.
ddp_find_unused_parameters: true
ddp_broadcast_buffers: false
ddp_static_graph: false
ddp_gradient_as_bucket_view: true

# Offline parallel data loading knobs
offline_shard_dataset_by_rank: false
offline_sync_eval: false
offline_eval_rank0_only: true

# Rank-aware logging/checkpoint/wandb knobs
rank0_logging_only: true

# Compile strategy for DDP runs:
# - off: force compile=false when WORLD_SIZE > 1 (recommended for initial validation)
# - on: keep user-provided compile flag
ddp_compile_strategy: off
