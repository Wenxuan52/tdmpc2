defaults:
    - override hydra/launcher: submitit_local

# environment
task: dog-run
obs: state
episodic: false

# evaluation
checkpoint: "" # for evaluation
eval_episodes: 10
eval_freq: 50000

# training
steps: 10_000_000
batch_size: 256
reward_coef: 0.1
value_coef: 0.1
termination_coef: 1
consistency_coef: 20
rho: 0.5
lr: 3e-4
enc_lr_scale: 0.3
grad_clip_norm: 20
tau: 0.01
discount_denom: 5
discount_min: 0.95
discount_max: 0.995
buffer_size: 1_000_000
exp_name: default
data_dir: /scratch_tide/wy524/tdmpc2/tdmpc2_data/mt30


# planning
mpc: true
planner_type: mppi
iterations: 6
num_samples: 512
num_elites: 64
num_pi_trajs: 24
horizon: 3
min_std: 0.05
max_std: 2
temperature: 0.5
diffusion_steps: 10
diffusion_beta0: 1e-4
diffusion_betaT: 1e-2
diffusion_num_samples: 16
diffusion_temperature: 0.5
diffusion_action_noise: 0.05
diffusion_log_stats: false
diffusion_mf_guidance: false
diffusion_mf_mode: qgrad_first
diffusion_mf_beta: 0.0
diffusion_mf_scale: 1.0
diffusion_mf_norm_clip: 0.0
diffusion_mf_q_type: min
diffusion_mf_use_target_q: false
diffusion_mf_eta: 1.0
diffusion_mf_topk: 32
diffusion_mf_temp: 0.1
diffusion_mf_std_floor: 1e-4
diffusion_mf_grad_norm_clip: 0.0
diffusion_mf_detach_weights: true
diffusion_distill_enabled: false
diffusion_distill_buffer_size: 50000
diffusion_distill_batch_size: 256
diffusion_policy_lr: 1e-4
diffusion_policy_weight_decay: 0.0
diffusion_policy_steps: 10
diffusion_policy_act: false
diffusion_score_distill_enabled: false
diffusion_teacher_num_samples: 32
diffusion_teacher_topk: 16
diffusion_teacher_temp: 0.1
diffusion_teacher_eta: 1.0
diffusion_teacher_beta: 0.2
diffusion_teacher_std_floor: 1e-4
diffusion_teacher_detach_weights: true
diffusion_teacher_grad_norm_clip: 0.0
diffusion_score_distill_batch_frac: 0.25
policy_update_type: gaussian
disable_gaussian_actor_when_diffusion: false
student_act_mixing_enabled: false
student_act_prob: 0.0
student_act_prob_schedule: constant
student_act_prob_final: 1.0
student_act_prob_warmup_steps: 0
student_act_prob_ramp_steps: 1000000
student_act_use_eval: false
planner_type_teacher: mppi
diffusion_distill_store_student: true
diffusion_actor_data_source: distill
debug_grad_check: false

# actor
log_std_min: -10
log_std_max: 2
entropy_coef: 1e-4

# critic
num_bins: 101
vmin: -10
vmax: +10

# architecture
model_size: 317
num_enc_layers: 2
enc_dim: 256
num_channels: 32
mlp_dim: 512
latent_dim: 512
task_dim: 96
num_q: 5
dropout: 0.01
simnorm_dim: 8

# logging
wandb_project: tdmpc2_test
wandb_entity: wenxuan-yuan-imperial-college-london
wandb_silent: false
enable_wandb: true
save_csv: true

# misc
compile: false
save_video: false
save_agent: true
seed: 1

# convenience
work_dir: /scratch_tide/wy524/tdmpc2/tdmpc2_runs
task_title: ???
multitask: ???
tasks: ???
obs_shape: ???
action_dim: ???
episode_length: ???
obs_shapes: ???
action_dims: ???
episode_lengths: ???
seed_steps: ???
bin_size: ???
